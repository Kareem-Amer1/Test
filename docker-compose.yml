services:
  api:
    image: cr.alkhwarizmi.online/template:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hire-exam-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      MongoDB__ConnectionString: ${MONGO_URI:-mongodb://host.docker.internal:27017/}
      MongoDB__DefaultDatabaseKey: Default
      MongoDB__Databases__Default: ${MONGO_DATABASE:-hire_exam}
      Jwt__Issuer: ${JWT_ISSUER:-hire-exam}
      Jwt__Audience: ${JWT_AUDIENCE:-hire-exam}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:-60}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:-30}
      Jwt__PrivateKeyPem: ${JWT_PRIVATE_KEY_PEM:-}
      Jwt__PublicKeyPem: ${JWT_PUBLIC_KEY_PEM:-}
    ports:
      - "15219:8080"
